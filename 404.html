<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    const repo = "/phonefinder-frontend"
    const path = window.location.pathname.replace(repo, "")
    const search = window.location.search
    const hash = window.location.hash

    // redirect back to index.html while preserving path
    window.location.replace(repo + "/index.html" + path + search + hash)
  </script>
</head>
<body>
</body>
</html>
